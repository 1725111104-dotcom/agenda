$def with (contactos)
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">
        <title>Agenda</title>
    </head>    
    <body>
            <h1>Lista de Contactos</h1>

<a href="/insertar_contacto">
    <button>Nuevo</button>
</a>

<br><br>

<input type="text" placeholder="Buscar">

<button>Buscar</button>

<br><br>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Primer Apellido</th>
        <th>Segundo Apellido</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Ver</th>
    </tr>
    $for contacto in contactos:
        <tr>
            <td>$contacto['id_contacto']</td>
            <td>$contacto['nombre']</td>
            <td>$contacto['primer_apellido']</td>
            <td>$contacto['segundo_apellido']</td>
            <td>$contacto['email']</td>
            <td>$contacto['telefono']</td>
            <td><a href="/ver_contacto/$contacto['id_contacto']"><button>Ver</button></a></td>

        </tr>

</table>

<br>


<a href="/editar_contacto">
    <button>Editar</button>
</a>

<a href="/borrar_contacto">
    <button>Borrar</button>
</a>
    </body>
</html>
